# dosbox-x.conf — run the termvideo DOS player under DOSBox-X.
#
# Usage (from the directory that holds PLAYER.EXE + your .tvid):
#
#   dosbox-x -conf /path/to/tools/dosbox-x.conf PLAYER.EXE CLIP.TVID
#
# The current working directory is mounted as C: (see [autoexec]), so launch
# from build-dos/ (option A) or build-dos/dos/ — wherever PLAYER.EXE lives.
# Press ESC in the player to stop playback.

[cpu]
# Run fast by default. The player decodes the whole ADPCM track and pre-loads the
# clip at startup, so a slow emulated CPU makes startup take ages (the screen just
# sits there — it looks frozen but is only loading). The dynamic core at max
# cycles loads near-instantly, and A/V pacing is driven by the Sound Blaster audio
# clock (the DMA/IRQ ISR), NOT the CPU cycle count, so emulated MHz does not affect
# sync — only how long the initial decode takes.
core=dynamic
cycles=max
#
# To emulate a *real* Pentium 1 instead (≈77000 cycles), uncomment these — but
# expect a long startup while it decodes at that speed. DOSBox-X ignores a bare
# "cycles=auto" ramp (it jumps to "max"), so pin a fixed count, not auto:
#   core=normal
#   cputype=pentium_slow
#   cycles=fixed 77000

[sblaster]
# Sound Blaster Pro 2 at the classic A220 I5 D1 — matches the BLASTER string the
# audio backend reads (8-bit auto-init DMA on channel 1, IRQ 5, base 0x220).
sbtype=sbpro2
sbbase=220
irq=5
dma=1

[autoexec]
# Mount the directory DOSBox-X was launched from as C: and switch to it, so the
# PLAYER.EXE / CLIP.TVID passed on the command line resolve. BLASTER must be set
# before the player runs (the backend defaults to A220 I5 D1 if it is unset, but
# we set it explicitly to be safe). The player .exe + args come from argv, so we
# do not hard-code a PLAYER.EXE line here.
mount c .
c:
set BLASTER=A220 I5 D1 T4
